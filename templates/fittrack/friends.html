{% extends 'fittrack/base.html' %}
{% load static %}

{% block title %}FitTrack - Friends{% endblock %}

{% block content %}
<div class="top-bar">
    <h1><i class="bi bi-people-fill me-2"></i>Friends</h1>
</div>

<div class="row g-4">
    <!-- Friends List -->
    <div class="col-md-4">
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <h5 class="card-title fw-bold">Find Friends</h5>
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Search username...">
                    <button class="btn btn-dark"><i class="bi bi-person-plus-fill"></i></button>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title fw-bold">Friends List</h5>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item text-muted">No friends added yet.</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Friend's Workouts -->
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body text-center" style="min-height: 300px; display: flex; align-items: center; justify-content: center;">
                <div>
                    <i class="bi bi-people text-muted" style="font-size: 3rem;"></i>
                    <p class="text-muted mt-2">Select a friend to view their workouts.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
