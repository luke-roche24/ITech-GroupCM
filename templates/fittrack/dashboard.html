<!-- File: dashboard.html 
This html represents the dashboard page 
-->
{% load static %}

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FitTrack — Dashboard</title>
  <link rel="stylesheet" href="{% static 'CSS/styles.css' %}" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">FITTRACK</div>
      <nav>
        <div><strong>Main</strong></div>
        <a href="/fittrack/dashboard/" class="nav-link">Dashboard</a>
        <a href="/fittrack/exercises/" class="nav-link">Your Exercises</a>
        <a href="/fittrack/workouts/" class="nav-link">Your Workouts</a>
        <a href="/fittrack/current/" class="nav-link">Current Plan</a>
        <div style="margin-top:12px"><strong>Progress</strong></div>
        <a href="/fittrack/progress/" class="nav-link">Trends</a>
        <a href="#">Personal Bests</a>
        <div style="margin-top:12px"><strong>Friends</strong></div>
        <a href="/fittrack/friends/" class="nav-link">Friends List</a>
        <div style="margin-top:12px"><strong>Account</strong></div>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
      </nav>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <h1>Hi, [Username]</h1>
        <div class="username">&nbsp;</div>
      </header>

      <main class="content">
        <div class="grid-2x2">
          <div class="card large">Current Workout Schedule</div>
          <div class="card large">Exercise Trends</div>
          <div class="card large">Log Session</div>
          <div class="card large">Recent Friends Workouts</div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
